<!DOCTYPE html>

<script id="amleht-gate-guard">
/* amleht gate guard — runs before any page content renders.
   Reads the auth flag set by /gate.html on successful passphrase
   entry. Anything older than 60 minutes is treated as expired. */
(function() {
  let ok = false;
  try {
    const raw = sessionStorage.getItem('amleht_gate_verified');
    if (raw) {
      const v = JSON.parse(raw);
      const age = Date.now() - v.verifiedAt;
      ok = (typeof v.verifiedAt === 'number' && age >= 0 && age < 60 * 60 * 1000);
    }
  } catch (e) { /* ok stays false */ }
  if (!ok) {
    sessionStorage.removeItem('amleht_gate_verified');
    window.location.replace('../../gate.html');
  }
})();
</script>

function ChainDot({ color, size = 10, glow = false, pulse = false }) {
  return (

      boxShadow: glow ? `0 0 12px ${color}60` : "none",

function HashBlock({ hash, label, color = "rgba(255,255,255,0.3)" }) {

<script id="amleht-session-timeout">
/* amleht Session Timeout — 60 min idle, 5 min warning */
/* (?debug=fast → 1 min idle, 0.5 min warning) */
(function() {
  const FAST = new URLSearchParams(window.location.search).get('debug') === 'fast';
  const IDLE_MINUTES    = FAST ? 1   : 60;
  const WARNING_MINUTES = FAST ? 0.5 : 5;
  const IDLE_MS    = IDLE_MINUTES    * 60 * 1000;
  const WARNING_MS = WARNING_MINUTES * 60 * 1000;
  const WARN_LABEL = FAST ? '30 seconds' : `${WARNING_MINUTES} minutes`;
  if (FAST) console.warn('[amleht] session timeout in DEBUG fast mode — 1 min idle');

  let idleTimer, warningTimer, warningShown = false;

  function resetTimers() {
    clearTimeout(idleTimer);
    clearTimeout(warningTimer);
    warningShown = false;
    const banner = document.getElementById('amleht-session-warning');
    if (banner) banner.remove();
    warningTimer = setTimeout(showWarning, IDLE_MS - WARNING_MS);
    idleTimer = setTimeout(logout, IDLE_MS);
  }

  function showWarning() {
    if (warningShown) return;
    warningShown = true;
    const banner = document.createElement('div');
    banner.id = 'amleht-session-warning';
    banner.style.cssText = `
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface, #152236); border: 1px solid var(--amber, #FFCC00);
      color: var(--text, #c8d8e8); font-family: var(--mono, 'IBM Plex Mono', 'JetBrains Mono', monospace);
      font-size: 12px; padding: 14px 24px; border-radius: 4px;
      z-index: 9999; display: flex; align-items: center; gap: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    `;
    banner.innerHTML = `
      <span style="color:var(--amber, #FFCC00);">⚠</span>
      <span>Session expires in <strong>${WARN_LABEL}</strong> due to inactivity.</span>
      <button id="amleht-session-extend"
        style="background:var(--amber, #FFCC00); color:var(--bg, #0D1829); border:none; padding:6px 14px;
               font-family:var(--mono, 'IBM Plex Mono', 'JetBrains Mono', monospace); font-size:11px;
               cursor:pointer; border-radius:2px; font-weight:600;">
        Extend Session
      </button>
    `;
    document.body.appendChild(banner);
    document.getElementById('amleht-session-extend')
      .addEventListener('click', resetTimers);
  }

  function logout() {
    /* Clear the auth flag so the user must re-enter the passphrase.
       amleht_gate (rate-limit attempts/lockUntil) is left alone —
       clearing it would let attackers bypass the 5-attempt lockout
       by triggering the timeout. */
    sessionStorage.removeItem('amleht_gate_verified');
    document.body.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:center;
                  min-height:100vh; background:var(--bg, #0D1829);
                  font-family:var(--mono, 'IBM Plex Mono', 'JetBrains Mono', monospace);
                  color:var(--text, #c8d8e8); text-align:center; flex-direction:column; gap:16px;">
        <div style="color:var(--amber, #FFCC00); font-size:11px; letter-spacing:0.15em;">SESSION EXPIRED</div>
        <div style="font-size:13px; color:var(--text-dim, #5a7a94);">
          This session was closed after ${IDLE_MINUTES} minutes of inactivity.
        </div>
        <button id="amleht-session-relogin"
          style="margin-top:8px; background:var(--amber, #FFCC00); color:var(--bg, #0D1829); border:none;
                 padding:10px 24px; font-family:var(--mono, 'IBM Plex Mono', 'JetBrains Mono', monospace);
                 font-size:12px; cursor:pointer; border-radius:2px; font-weight:600;">
          Log In Again
        </button>
        <div style="font-size:10px; color:var(--border, #2A3F5F); margin-top:32px;">
          <em>In memory of Thelma</em>
        </div>
      </div>`;
    document.getElementById('amleht-session-relogin')
      .addEventListener('click', () => { location.href = '../../gate.html'; });
  }

  ['mousemove','mousedown','keydown','touchstart','scroll','click']
    .forEach(e => document.addEventListener(e, resetTimers, true));

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', resetTimers);
  } else {
    resetTimers();
  }
})();
</script>
