<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script id="amleht-gate-guard">
/* amleht gate guard — runs before any page content renders.
   Reads the auth flag set by /gate.html on successful passphrase
   entry. Anything older than 60 minutes is treated as expired. */
(function() {
  let ok = false;
  try {
    const raw = sessionStorage.getItem('amleht_gate_verified');
    if (raw) {
      const v = JSON.parse(raw);
      const age = Date.now() - v.verifiedAt;
      ok = (typeof v.verifiedAt === 'number' && age >= 0 && age < 60 * 60 * 1000);
    }
  } catch (e) { /* ok stays false */ }
  if (!ok) {
    sessionStorage.removeItem('amleht_gate_verified');
    window.location.replace('../../../gate.html');
  }
})();
</script>
<title>Operation Gethsemane · Infra 4.0 | amleht</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #03040a;
    --amber: #d4a843;
    --amber-d: #8a6f2a;
    --green: #2dd472;
    --red: #ff4757;
    --blue: #3d9eff;
    --gold: #f0d060;
    --purple: #a47fe8;
    --t1: #dde4f5;
    --t2: #4a5570;
    --t3: #252d45;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Cormorant Garamond', serif;
    --display: 'Syne', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--t1);
    font-family: var(--mono);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* HEADER */
  .hdr {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px;
    border-bottom: 1px solid #0e1520;
    position: relative;
    z-index: 10;
  }

  .hdr-l { display: flex; align-items: center; gap: 16px; }
  .mark { font-family: var(--display); font-size: 14px; font-weight: 700; color: var(--amber); letter-spacing: .10em; }
  .op-id { font-size: 9px; font-weight: 600; letter-spacing: .16em; color: var(--t3); border: 1px solid #111928; padding: 3px 7px; border-radius: 2px; }
  .hdr-r { display: flex; align-items: center; gap: 12px; }

  /* STAGE BUTTONS */
  .stage-btn {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .12em;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid #1a2438;
    color: var(--t2);
    border-radius: 2px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }

  .stage-btn:hover { border-color: var(--amber); color: var(--amber); }
  .stage-btn.active { border-color: var(--amber); color: var(--amber); background: rgba(212,168,67,.06); }
  .stage-btn.btn-red.active { border-color: var(--red); color: var(--red); background: rgba(255,71,87,.06); }

  /* AUTO PLAY */
  .auto-btn {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .14em;
    padding: 6px 16px;
    background: rgba(212,168,67,.08);
    border: 1px solid var(--amber-d);
    color: var(--amber);
    border-radius: 2px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }

  .auto-btn:hover { background: var(--amber); color: var(--bg); }

  /* CANVAS */
  #canvas {
    display: block;
    width: 100%;
  }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 32px;
    border-top: 1px solid #0e1520;
    background: #04050c;
    min-height: 40px;
  }

  .sb-event {
    font-size: 10px;
    color: var(--t2);
    font-family: var(--mono);
  }

  .sb-event span { color: var(--amber); }
  .sb-event .g   { color: var(--green); }
  .sb-event .r   { color: var(--red); }
  .sb-event .gold{ color: var(--gold); }

  .sb-written {
    font-family: var(--serif);
    font-size: 13px;
    font-style: italic;
    color: var(--amber-d);
    letter-spacing: .04em;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    padding: 8px 32px;
    border-bottom: 1px solid #0e1520;
    background: #04050c;
    flex-wrap: wrap;
  }

  .lg-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    color: var(--t2);
    letter-spacing: .08em;
  }

  .lg-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>

<div class="legend">

  <div class="lg-item"><div class="lg-dot" style="background:#a47fe8"></div>Azure</div>
  <div class="lg-item"><div class="lg-dot" style="background:#ff8c42"></div>Equinix</div>
  <div class="lg-item"><div class="lg-dot" style="background:#f0d060"></div>Fictief NV · FNV</div>
  <div class="lg-item"><div class="lg-dot" style="background:#d4a843"></div>Rail 1 · Nebius B.V.</div>

<canvas id="canvas"></canvas>

<div class="status-bar">

  <div class="sb-written" id="statusWritten">Agent XII · Watching · Ready to attest</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Sizing
function resize() {
  const w = window.innerWidth;
  const h = Math.max(window.innerHeight - 130, 600);
  canvas.width = w;
  canvas.height = h;
  draw();
}

window.addEventListener('resize', resize);

// ── TOPOLOGY CONSTANTS ──
const PROVIDERS = {
  AWS:     '#3d9eff',
  GCP:     '#2dd472',
  Azure:   '#a47fe8',
  Equinix: '#ff8c42',
  FNV:     '#f0d060',
};

// Bank nodes — will be positioned relative to canvas size
const BANKS = [
  { id: 'I',    label: 'I',    provider: 'AWS',     cloud: 'AWS' },
  { id: 'II',   label: 'II',   provider: 'Azure',   cloud: 'Azure' },
  { id: 'III',  label: 'III',  provider: 'GCP',     cloud: 'GCP' },
  { id: 'IV',   label: 'IV',   provider: 'Equinix', cloud: 'Equinix' },
  { id: 'V',    label: 'V',    provider: 'AWS',     cloud: 'AWS' },
  { id: 'VI',   label: 'VI',   provider: 'Azure',   cloud: 'Azure' },
  { id: 'VII',  label: 'VII',  provider: 'GCP',     cloud: 'GCP' },
  { id: 'VIII', label: 'VIII', provider: 'Equinix', cloud: 'Equinix' },
  { id: 'FNV',  label: 'FNV',  provider: 'FNV',     cloud: 'AWS', judas: true },
  { id: 'IX',   label: 'IX',   provider: 'AWS',     cloud: 'AWS' },
  { id: 'X',    label: 'X',    provider: 'Azure',   cloud: 'Azure' },
  { id: 'XI',   label: 'XI',   provider: 'GCP',     cloud: 'GCP' },
  { id: 'XII',  label: 'XII',  provider: 'Equinix', cloud: 'Equinix' },
];

// Animation state
let stage = 0;
let animFrame = null;
let t = 0; // global time
let pulses = []; // active pulse particles
let isolationProgress = 0; // 0-1
let isolationStartTime = null;
let writtenFlash = 0;
let autoTimer = null;

const STAGE_EVENTS = [
  'Stage I — The Garden · 12 banks connected · Dual rails standing by',
  'Stage II — Heartbeat Active · Compliance traffic flowing · Both rails pulsing',
  'Stage III — Betrayal Detected · FNV anomalous traffic · DUAL_CONFIRM divergence firing',
  'Stage IV — Isolation · FNV severed · Rails uninterrupted · Agent XX quarantine active',
  'Stage V — It Is Written · Agent XII attested · Chain record immutable · DORA Art.19 prepared',
];

const STAGE_WRITTEN = [
  'Agent XII · Watching · Ready to attest',
  'Agent XII · Attesting · "It is written"',
  'Agent XII · ALERT · Divergence detected · Preparing isolation record',
  'Agent XII · ISOLATING · FNV record sealed · Evidence chain locked',
  '"It is written — and the record stands against you." — DORA Art.19',
];

function setStage(n) {
  stage = n;
  [0,1,2,3,4].forEach(i => {
    const b = document.getElementById('btn' + i);
    b.className = 'stage-btn' + (i === 2 ? ' btn-red' : '') + (i === n ? ' active' : '');
  });
  document.getElementById('statusEvent').innerHTML = STAGE_EVENTS[n]
    .replace('FNV', '<span class="r">FNV</span>')
    .replace('Both rails', '<span class="g">Both rails</span>')
    .replace('It Is Written', '<span class="gold">It Is Written</span>');
  document.getElementById('statusWritten').textContent = STAGE_WRITTEN[n];

  if (n === 4) writtenFlash = 1;
  if (n >= 2) isolationStartTime = isolationStartTime || t;
  if (n < 2) { isolationStartTime = null; isolationProgress = 0; }
}

function autoPlay() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  let s = 0;
  const delays = [0, 2500, 5000, 8000, 12000];
  delays.forEach((d, i) => {
    autoTimer = setTimeout(() => setStage(i), d);
  });
}

// ── LAYOUT CALCULATIONS ──
function getLayout() {
  const W = canvas.width;
  const H = canvas.height;
  const cx = W / 2;

  // Ellipse for bank nodes — top portion of canvas
  const ellipseRx = W * 0.34;
  const ellipseRy = H * 0.18;
  const ellipseCY = H * 0.28;

  // Position 13 nodes around the ellipse
  const bankPositions = BANKS.map((b, i) => {
    const angle = (i / BANKS.length) * Math.PI * 2 - Math.PI / 2;
    return {
      ...b,
      x: cx + Math.cos(angle) * ellipseRx,
      y: ellipseCY + Math.sin(angle) * ellipseRy,
    };
  });

  // MILAN label position (left)
  const milan = { x: cx - ellipseRx - 80, y: ellipseCY };
  // SWEDEN label position (right)
  const sweden = { x: cx + ellipseRx + 80, y: ellipseCY };

  // Agent Zero — center of the garden
  const agentZero = { x: cx, y: ellipseCY };

  // Spine nodes
  const spineA = { x: cx - W * 0.18, y: H * 0.62, label: 'SPINE A', sublabel: 'Nebius B.V. · Helsinki', color: '#3d9eff' };
  const spineB = { x: cx + W * 0.18, y: H * 0.62, label: 'SPINE B', sublabel: 'Scaleway · Paris', color: '#2dd472' };

  // Rail endpoints (inference nodes)
  const rail1 = { x: cx - W * 0.22, y: H * 0.80, label: 'RAIL 1', sublabel: 'Nebius B.V. NL · DeepSeek', color: '#3d9eff' };
  const rail2 = { x: cx + W * 0.22, y: H * 0.80, label: 'RAIL 2', sublabel: 'Scaleway FR · Mistral', color: '#2dd472' };

  // Agent XII — The Tablet — Mount of Olives
  const agentXII = { x: cx, y: H * 0.93, label: 'AGENT XII', sublabel: '"It is written"', color: '#d4a843' };

  return { W, H, cx, bankPositions, agentZero, spineA, spineB, rail1, rail2, agentXII, milan, sweden, ellipseCY };
}

// ── DRAW FUNCTIONS ──

function drawGrid(W, H) {
  ctx.strokeStyle = 'rgba(61,158,255,0.025)';
  ctx.lineWidth = 1;
  const gs = 50;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawGlow(x, y, r, color, alpha) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, color.replace(')', `,${alpha})`).replace('rgb', 'rgba'));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}

function drawConnection(x1, y1, x2, y2, color, alpha, dash = [], width = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  if (dash.length) ctx.setLineDash(dash);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawPulse(x1, y1, x2, y2, progress, color, size = 3) {
  const px = x1 + (x2 - x1) * progress;
  const py = y1 + (y2 - y1) * progress;
  ctx.save();
  ctx.fillStyle = color;
  ctx.shadowBlur = 8;
  ctx.shadowColor = color;
  ctx.beginPath();
  ctx.arc(px, py, size, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawNode(x, y, r, label, color, glowAlpha, extra = {}) {
  // Outer glow
  if (glowAlpha > 0) {
    drawGlow(x, y, r * 3, color, glowAlpha * 0.3);
  }

  // Ring
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = extra.thick || 1.5;
  ctx.globalAlpha = extra.ringAlpha || 0.6;
  if (extra.dash) ctx.setLineDash(extra.dash);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Inner ring (double ring for special nodes)
  if (extra.doubleRing) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(x, y, r + 6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // Fill
  ctx.save();
  const bg = extra.fill || 'rgba(4,5,14,0.85)';
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(x, y, r - 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Label
  ctx.save();
  ctx.fillStyle = extra.labelColor || color;
  ctx.font = `${extra.fontWeight || '600'} ${extra.fontSize || '11px'} 'JetBrains Mono'`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
  ctx.restore();
}

function drawLabel(x, y, lines, colors, sizes, align = 'center') {
  lines.forEach((line, i) => {
    ctx.save();
    ctx.fillStyle = colors[i] || 'rgba(90,102,128,0.8)';
    ctx.font = `${sizes[i] || '10px'} 'JetBrains Mono'`;
    ctx.textAlign = align;
    ctx.textBaseline = 'top';
    ctx.fillText(line, x, y + i * (parseInt(sizes[i]) + 3));
    ctx.restore();
  });
}

function draw() {
  const { W, H, cx, bankPositions, agentZero, spineA, spineB, rail1, rail2, agentXII, milan, sweden, ellipseCY } = getLayout();

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#03040a';
  ctx.fillRect(0, 0, W, H);

  // Ambient glows
  drawGlow(cx - W * 0.28, ellipseCY, W * 0.2, '#d4a843', 0.06 + Math.sin(t * 0.5) * 0.02);
  drawGlow(cx + W * 0.28, ellipseCY, W * 0.2, '#3d9eff', 0.05 + Math.cos(t * 0.4) * 0.02);
  if (stage >= 1) {
    drawGlow(spineA.x, spineA.y, 80, '#3d9eff', 0.08);
    drawGlow(spineB.x, spineB.y, 80, '#2dd472', 0.08);
  }
  if (stage === 4) {
    drawGlow(agentXII.x, agentXII.y, 100, '#d4a843', 0.12 + Math.sin(t * 2) * 0.05);
  }

  drawGrid(W, H);

  // ── BANK-TO-BANK MESH CONNECTIONS ──
  const judasIdx = BANKS.findIndex(b => b.judas);
  bankPositions.forEach((b, i) => {
    bankPositions.forEach((b2, j) => {
      if (j <= i) return;
      const isJudasConn = (i === judasIdx || j === judasIdx);
      let alpha = 0.06;
      let color = '#3d9eff';
      let dash = [3, 6];

      if (stage >= 3 && isJudasConn) {
        // Severing animation
        const elapsed = t - (isolationStartTime || t);
        alpha = Math.max(0, 0.06 - elapsed * 0.04);
        color = '#ff4757';
      }

      if (alpha > 0) {
        drawConnection(b.x, b.y, b2.x, b2.y, color, alpha, dash, 0.5);
      }
    });
  });

  // ── BANK NODES ──
  bankPositions.forEach((b, i) => {
    const isJudas = b.judas;
    const color = PROVIDERS[b.provider];
    let nodeColor = color;
    let glowAlpha = 0.3 + Math.sin(t * 0.8 + i * 0.5) * 0.1;
    let extra = { doubleRing: isJudas };

    if (stage >= 2 && isJudas) {
      // Judas goes red
      const elapsed = t - (isolationStartTime || t);
      const redProgress = Math.min(1, elapsed * 0.5);
      nodeColor = lerpColor(color, '#ff4757', redProgress);
      glowAlpha = 0.5 + Math.sin(t * 3) * 0.2;
      extra.thick = 2.5;
    }

    if (stage >= 3 && isJudas) {
      // Isolated — fade out
      const elapsed = t - (isolationStartTime || t);
      const fadeProgress = Math.min(1, (elapsed - 2) * 0.3);
      ctx.save();
      ctx.globalAlpha = Math.max(0.1, 1 - fadeProgress * 0.8);
    }

    drawNode(b.x, b.y, 20, b.label, nodeColor, glowAlpha, extra);

    if (stage >= 3 && isJudas) ctx.restore();

    // Provider label below
    const provAlpha = (stage >= 3 && isJudas) ? 0.15 : 0.5;
    ctx.save();
    ctx.globalAlpha = provAlpha;
    ctx.fillStyle = nodeColor;
    ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText(b.cloud, b.x, b.y + 28);
    if (isJudas) ctx.fillText('FICTIEF NV', b.x, b.y + 38);
    ctx.restore();
  });

  // ── MILAN / SWEDEN LABELS ──
  ctx.save();
  ctx.fillStyle = 'rgba(212,168,67,0.5)';
  ctx.font = 'bold 12px Syne';
  ctx.textAlign = 'right';
  ctx.fillText('MILAN', milan.x, milan.y - 6);
  ctx.font = '9px JetBrains Mono';
  ctx.fillStyle = 'rgba(212,168,67,0.3)';
  ctx.fillText('eu-south-1', milan.x, milan.y + 8);
  ctx.restore();

  ctx.save();
  ctx.fillStyle = 'rgba(61,158,255,0.5)';
  ctx.font = 'bold 12px Syne';
  ctx.textAlign = 'left';
  ctx.fillText('SWEDEN', sweden.x, sweden.y - 6);
  ctx.font = '9px JetBrains Mono';
  ctx.fillStyle = 'rgba(61,158,255,0.3)';
  ctx.fillText('eu-north-1', sweden.x, sweden.y + 8);
  ctx.restore();

  // ── AGENT ZERO ──
  if (stage >= 0) {
    const azColor = stage >= 2 ? '#ff8c42' : '#d4a843';
    drawNode(agentZero.x, agentZero.y, 28, 'A0', azColor, 0.4, {
      doubleRing: true,
      thick: 2,
      fontSize: '12px',
      fontWeight: '700',
    });

    ctx.save();
    ctx.fillStyle = 'rgba(212,168,67,0.6)';
    ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('AGENT ZERO', agentZero.x, agentZero.y + 36);
    ctx.fillText('MCP ROUTER', agentZero.x, agentZero.y + 46);
    ctx.restore();

    // Bank → Agent Zero connections
    bankPositions.forEach((b, i) => {
      const isJudas = b.judas;
      let alpha = 0.08;
      let color = '#d4a843';

      if (stage >= 3 && isJudas) {
        const elapsed = t - (isolationStartTime || t);
        alpha = Math.max(0, 0.1 - elapsed * 0.05);
        color = '#ff4757';
      }

      if (alpha > 0.01) {
        drawConnection(b.x, b.y, agentZero.x, agentZero.y, color, alpha, [2, 4], 0.8);
      }
    });
  }

  // ── RAILS (Stage 1+) ──
  if (stage >= 1) {
    // Agent Zero → Spine A
    drawConnection(agentZero.x, agentZero.y, spineA.x, spineA.y, '#3d9eff', 0.35, [], 1.5);
    // Agent Zero → Spine B
    drawConnection(agentZero.x, agentZero.y, spineB.x, spineB.y, '#2dd472', 0.35, [], 1.5);
    // Spine A → Rail 1
    drawConnection(spineA.x, spineA.y, rail1.x, rail1.y, '#3d9eff', 0.35, [], 1.5);
    // Spine B → Rail 2
    drawConnection(spineB.x, spineB.y, rail2.x, rail2.y, '#2dd472', 0.35, [], 1.5);
    // East-West spine link
    drawConnection(spineA.x, spineA.y, spineB.x, spineB.y, '#d4a843', 0.2, [4, 4], 1);
    // Rails → Agent XII
    drawConnection(rail1.x, rail1.y, agentXII.x, agentXII.y, '#3d9eff', 0.3, [], 1.5);
    drawConnection(rail2.x, rail2.y, agentXII.x, agentXII.y, '#2dd472', 0.3, [], 1.5);

    // SPINE A node
    drawNode(spineA.x, spineA.y, 22, 'SA', '#3d9eff', 0.4, { thick: 2, fontSize: '10px', fontWeight: '600' });
    ctx.save();
    ctx.fillStyle = 'rgba(61,158,255,0.6)';
    ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('SPINE A', spineA.x, spineA.y + 30);
    ctx.fillStyle = 'rgba(61,158,255,0.35)';
    ctx.fillText('Nebius B.V. · NL', spineA.x, spineA.y + 40);
    ctx.restore();

    // SPINE B node
    drawNode(spineB.x, spineB.y, 22, 'SB', '#2dd472', 0.4, { thick: 2, fontSize: '10px', fontWeight: '600' });
    ctx.save();
    ctx.fillStyle = 'rgba(45,212,114,0.6)';
    ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('SPINE B', spineB.x, spineB.y + 30);
    ctx.fillStyle = 'rgba(45,212,114,0.35)';
    ctx.fillText('Scaleway · FR', spineB.x, spineB.y + 40);
    ctx.restore();

    // RAIL 1 node
    drawNode(rail1.x, rail1.y, 20, 'R1', '#3d9eff', 0.35, { fontSize: '10px' });
    ctx.save();
    ctx.fillStyle = 'rgba(61,158,255,0.5)';
    ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('RAIL 1 · NEBIUS', rail1.x, rail1.y + 28);
    ctx.fillStyle = 'rgba(61,158,255,0.3)';
    ctx.fillText('Helsinki · Finland', rail1.x, rail1.y + 38);
    ctx.restore();

    // RAIL 2 node
    drawNode(rail2.x, rail2.y, 20, 'R2', '#2dd472', 0.35, { fontSize: '10px' });
    ctx.save();
    ctx.fillStyle = 'rgba(45,212,114,0.5)';
    ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('RAIL 2 · SCALEWAY', rail2.x, rail2.y + 28);
    ctx.fillStyle = 'rgba(45,212,114,0.3)';
    ctx.fillText('Paris · France', rail2.x, rail2.y + 38);
    ctx.restore();

    // AGENT XII
    const xiiGlow = stage === 4 ? 0.5 + Math.sin(t * 2) * 0.2 : 0.3;
    drawNode(agentXII.x, agentXII.y, 26, 'XII', '#d4a843', xiiGlow, {
      thick: 2, doubleRing: true, fontSize: '11px', fontWeight: '700'
    });

    ctx.save();
    const writtenAlpha = stage === 4 ? 0.8 + Math.sin(t * 1.5) * 0.15 : 0.4;
    ctx.fillStyle = `rgba(212,168,67,${writtenAlpha})`;
    ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('AGENT XII · LEDGER', agentXII.x, agentXII.y + 34);
    if (stage === 4) {
      ctx.font = 'italic 11px Cormorant Garamond';
      ctx.fillStyle = `rgba(212,168,67,${0.6 + Math.sin(t * 2) * 0.3})`;
      ctx.fillText('"It is written"', agentXII.x, agentXII.y + 46);
    }
    ctx.restore();

    // East-West label
    ctx.save();
    ctx.fillStyle = 'rgba(212,168,67,0.3)';
    ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('E-W · mTLS', (spineA.x + spineB.x) / 2, spineA.y - 10);
    ctx.restore();
  }

  // ── HEARTBEAT PULSES (Stage 1+) ──
  if (stage >= 1) {
    // Spawn pulses
    if (Math.random() < 0.04) {
      // Bank → Agent Zero pulse
      const bank = bankPositions[Math.floor(Math.random() * bankPositions.length)];
      if (!bank.judas || stage < 3) {
        pulses.push({
          x1: bank.x, y1: bank.y,
          x2: agentZero.x, y2: agentZero.y,
          p: 0, color: PROVIDERS[bank.provider], speed: 0.015, size: 2.5
        });
      }
    }

    if (Math.random() < 0.06) {
      // Agent Zero → Spine
      const toSpine = Math.random() < 0.5 ? spineA : spineB;
      pulses.push({
        x1: agentZero.x, y1: agentZero.y,
        x2: toSpine.x, y2: toSpine.y,
        p: 0, color: toSpine.color, speed: 0.02, size: 3
      });
    }

    if (Math.random() < 0.05) {
      // Spine → Rail
      pulses.push({
        x1: spineA.x, y1: spineA.y,
        x2: rail1.x, y2: rail1.y,
        p: 0, color: '#3d9eff', speed: 0.018, size: 2.5
      });
      pulses.push({
        x1: spineB.x, y1: spineB.y,
        x2: rail2.x, y2: rail2.y,
        p: 0, color: '#2dd472', speed: 0.018, size: 2.5
      });
    }

    if (Math.random() < 0.04) {
      // Rail → Agent XII
      const fromRail = Math.random() < 0.5 ? rail1 : rail2;
      pulses.push({
        x1: fromRail.x, y1: fromRail.y,
        x2: agentXII.x, y2: agentXII.y,
        p: 0, color: fromRail.color, speed: 0.016, size: 3, toXII: true
      });
    }

    // Judas pulse (Stage 2 only — anomalous)
    if (stage === 2 && Math.random() < 0.08) {
      const judas = bankPositions[judasIdx];
      pulses.push({
        x1: judas.x, y1: judas.y,
        x2: agentZero.x, y2: agentZero.y,
        p: 0, color: '#ff4757', speed: 0.025, size: 4, anomalous: true
      });
    }

    // Update and draw pulses
    pulses = pulses.filter(pulse => pulse.p < 1);
    pulses.forEach(pulse => {
      pulse.p += pulse.speed;
      if (pulse.p > 1) return;
      ctx.save();
      if (pulse.anomalous) {
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#ff4757';
      } else if (pulse.toXII) {
        ctx.shadowBlur = 8;
        ctx.shadowColor = pulse.color;
      }
      drawPulse(pulse.x1, pulse.y1, pulse.x2, pulse.y2, pulse.p, pulse.color, pulse.size);
      ctx.restore();
    });
  }

  // ── ISOLATION EFFECT (Stage 3+) ──
  if (stage >= 3) {
    const judas = bankPositions[judasIdx];
    const elapsed = Math.max(0, t - (isolationStartTime || t) - 1);
    const fadeOut = Math.min(1, elapsed * 0.25);

    // Red isolation ring expanding
    if (fadeOut < 0.8) {
      ctx.save();
      ctx.strokeStyle = '#ff4757';
      ctx.lineWidth = 2;
      ctx.globalAlpha = (1 - fadeOut) * 0.6;
      ctx.beginPath();
      ctx.arc(judas.x, judas.y, 20 + elapsed * 30, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // ISOLATED label
    if (elapsed > 1) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, (elapsed - 1) * 0.5);
      ctx.fillStyle = '#ff4757';
      ctx.font = 'bold 9px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText('ISOLATED', judas.x, judas.y + 50);
      ctx.restore();
    }
  }

  // ── WRITTEN FLASH (Stage 4) ──
  if (stage === 4 && writtenFlash > 0) {
    ctx.save();
    ctx.globalAlpha = writtenFlash * 0.15;
    ctx.fillStyle = '#d4a843';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    writtenFlash *= 0.92;
  }

  // ── STAGE TITLE OVERLAY ──
  const titles = [
    'The Garden', 'Heartbeat', 'Betrayal', 'Isolation', 'It Is Written'
  ];
  const titleColors = ['#d4a843', '#2dd472', '#ff4757', '#ff8c42', '#f0d060'];

  ctx.save();
  ctx.fillStyle = titleColors[stage];
  ctx.globalAlpha = 0.12;
  ctx.font = `bold ${Math.min(W * 0.08, 72)}px Syne`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText(titles[stage].toUpperCase(), W - 24, H - 50);
  ctx.restore();

  t += 0.016;
}

// Color lerp helper
function lerpColor(c1, c2, t) {
  const h1 = c1.replace('#', '');
  const h2 = c2.replace('#', '');
  const r1 = parseInt(h1.substr(0,2),16), g1 = parseInt(h1.substr(2,2),16), b1 = parseInt(h1.substr(4,2),16);
  const r2 = parseInt(h2.substr(0,2),16), g2 = parseInt(h2.substr(2,2),16), b2 = parseInt(h2.substr(4,2),16);
  const r = Math.round(r1 + (r2-r1)*t).toString(16).padStart(2,'0');
  const g = Math.round(g1 + (g2-g1)*t).toString(16).padStart(2,'0');
  const b = Math.round(b1 + (b2-b1)*t).toString(16).padStart(2,'0');
  return `#${r}${g}${b}`;
}

// ── ANIMATION LOOP ──
function loop() {
  draw();
  animFrame = requestAnimationFrame(loop);
}

// Init
resize();
setStage(0);
loop();
</script>
<script id="amleht-session-timeout">
/* amleht Session Timeout — 60 min idle, 5 min warning */
/* (?debug=fast → 1 min idle, 0.5 min warning) */
(function() {
  const FAST = new URLSearchParams(window.location.search).get('debug') === 'fast';
  const IDLE_MINUTES    = FAST ? 1   : 60;
  const WARNING_MINUTES = FAST ? 0.5 : 5;
  const IDLE_MS    = IDLE_MINUTES    * 60 * 1000;
  const WARNING_MS = WARNING_MINUTES * 60 * 1000;
  const WARN_LABEL = FAST ? '30 seconds' : `${WARNING_MINUTES} minutes`;
  if (FAST) console.warn('[amleht] session timeout in DEBUG fast mode — 1 min idle');

  let idleTimer, warningTimer, warningShown = false;

  function resetTimers() {
    clearTimeout(idleTimer);
    clearTimeout(warningTimer);
    warningShown = false;
    const banner = document.getElementById('amleht-session-warning');
    if (banner) banner.remove();
    warningTimer = setTimeout(showWarning, IDLE_MS - WARNING_MS);
    idleTimer = setTimeout(logout, IDLE_MS);
  }

  function showWarning() {
    if (warningShown) return;
    warningShown = true;
    const banner = document.createElement('div');
    banner.id = 'amleht-session-warning';
    banner.style.cssText = `
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface, #152236); border: 1px solid var(--amber, #FFCC00);
      color: var(--text, #c8d8e8); font-family: var(--mono, 'IBM Plex Mono', 'JetBrains Mono', monospace);
      font-size: 12px; padding: 14px 24px; border-radius: 4px;
      z-index: 9999; display: flex; align-items: center; gap: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    `;
    banner.innerHTML = `
      <span style="color:var(--amber, #FFCC00);">⚠</span>
      <span>Session expires in <strong>${WARN_LABEL}</strong> due to inactivity.</span>
      <button id="amleht-session-extend"
        style="background:var(--amber, #FFCC00); color:var(--bg, #0D1829); border:none; padding:6px 14px;
               font-family:var(--mono, 'IBM Plex Mono', 'JetBrains Mono', monospace); font-size:11px;
               cursor:pointer; border-radius:2px; font-weight:600;">
        Extend Session
      </button>
    `;
    document.body.appendChild(banner);
    document.getElementById('amleht-session-extend')
      .addEventListener('click', resetTimers);
  }

  function logout() {
    /* Clear the auth flag so the user must re-enter the passphrase.
       amleht_gate (rate-limit attempts/lockUntil) is left alone —
       clearing it would let attackers bypass the 5-attempt lockout
       by triggering the timeout. */
    sessionStorage.removeItem('amleht_gate_verified');
    document.body.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:center;
                  min-height:100vh; background:var(--bg, #0D1829);
                  font-family:var(--mono, 'IBM Plex Mono', 'JetBrains Mono', monospace);
                  color:var(--text, #c8d8e8); text-align:center; flex-direction:column; gap:16px;">
        <div style="color:var(--amber, #FFCC00); font-size:11px; letter-spacing:0.15em;">SESSION EXPIRED</div>
        <div style="font-size:13px; color:var(--text-dim, #5a7a94);">
          This session was closed after ${IDLE_MINUTES} minutes of inactivity.
        </div>
        <button id="amleht-session-relogin"
          style="margin-top:8px; background:var(--amber, #FFCC00); color:var(--bg, #0D1829); border:none;
                 padding:10px 24px; font-family:var(--mono, 'IBM Plex Mono', 'JetBrains Mono', monospace);
                 font-size:12px; cursor:pointer; border-radius:2px; font-weight:600;">
          Log In Again
        </button>
        <div style="font-size:10px; color:var(--border, #2A3F5F); margin-top:32px;">
          <em>In memory of Thelma</em>
        </div>
      </div>`;
    document.getElementById('amleht-session-relogin')
      .addEventListener('click', () => { location.href = '../../../gate.html'; });
  }

  ['mousemove','mousedown','keydown','touchstart','scroll','click']
    .forEach(e => document.addEventListener(e, resetTimers, true));

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', resetTimers);
  } else {
    resetTimers();
  }
})();
</script>
